steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "--build-arg=NEXT_PUBLIC_GTM_ID=${_GTM_ID}"
      - "--build-arg=NEXT_PUBLIC_GA4_ID=${_GA4_ID}"
      - "--build-arg=NEXT_PUBLIC_CLARITY_ID=${_CLARITY_ID}"
      - "-t"
      - "us-central1-docker.pkg.dev/${PROJECT_ID}/skyride-web/app:${_TAG}"
      - "-t"
      - "us-central1-docker.pkg.dev/${PROJECT_ID}/skyride-web/app:latest"
      - "."

  # Push the container image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "--all-tags", "us-central1-docker.pkg.dev/${PROJECT_ID}/skyride-web/app"]

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "skyride-web"
      - "--image=us-central1-docker.pkg.dev/${PROJECT_ID}/skyride-web/app:${_TAG}"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--port=8080"
      - "--cpu=1"
      - "--memory=512Mi"
      - "--min-instances=0"
      - "--max-instances=10"
      - "--set-env-vars=NODE_ENV=production,VERTEX_AI_PROJECT=${PROJECT_ID}"
      - "--remove-secrets=MAILGUN_API_KEY"

substitutions:
  _REGION: us-central1
  _TAG: latest
  _GTM_ID: "GTM-W433GH2"
  _GA4_ID: ""
  _CLARITY_ID: ""

options:
  logging: CLOUD_LOGGING_ONLY
